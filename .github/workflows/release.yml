name: Build LoxBerry ZIP

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          bash -n postroot.sh
          shellcheck postroot.sh

      - name: Validate Perl CGI syntax
        run: |
          mkdir -p /tmp/loxberry-stubs/LoxBerry
          cat > /tmp/loxberry-stubs/LoxBerry/System.pm <<'EOF'
          package LoxBerry::System;
          sub get_localip { return '127.0.0.1'; }
          1;
          EOF
          cat > /tmp/loxberry-stubs/LoxBerry/Web.pm <<'EOF'
          package LoxBerry::Web;
          sub lbheader { return 1; }
          sub lbfooter { return 1; }
          1;
          EOF
          perl -I/tmp/loxberry-stubs -c webfrontend/htmlauth/index.cgi
          perl -I/tmp/loxberry-stubs -c webfrontend/htmlauth/diagnose.cgi

      - name: Validate plugin metadata
        run: |
          test -s plugin.cfg
          grep -q '^VERSION=' plugin.cfg
          grep -q '^NAME=docker$' plugin.cfg
          grep -q '^FOLDER=docker$' plugin.cfg

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [[ "\${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="\${GITHUB_REF_NAME}"
          elif [[ "\${GITHUB_REF_NAME}" == "main" ]]; then
            VERSION="stable"
          else
            VERSION="prerelease"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zipname=loxberry-docker-diagnostics-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        run: |
          mkdir -p dist
          zip -r "dist/\${{ steps.version.outputs.zipname }}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "dist/*" \
            -x "*.zip"
          unzip -t "dist/\${{ steps.version.outputs.zipname }}"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v5
        with:
          name: \${{ steps.version.outputs.zipname }}
          path: dist/\${{ steps.version.outputs.zipname }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/\${{ steps.version.outputs.zipname }}
          prerelease: \${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'pre') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
